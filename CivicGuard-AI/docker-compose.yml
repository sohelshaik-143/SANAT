version: '3.9'

services:
  # ─── MongoDB Database ────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: civicguard-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: civicguard_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-CivicGuard@2026}
      MONGO_INITDB_DATABASE: civicguard_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - civicguard-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend API ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicguard-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://civicguard_admin:${MONGO_PASSWORD:-CivicGuard@2026}@mongodb:27017/civicguard_db?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: civicguard_db
      AI_ENGINE_URL: http://ai-engine:5000
      JWT_SECRET: ${JWT_SECRET:-CivicGuardSuperSecretKey2026India}
      JWT_EXPIRATION: 86400000
      UPLOAD_DIR: /app/uploads
    volumes:
      - complaint_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - civicguard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Python AI Verification Engine ──────────────────────────
  ai-engine:
    build:
      context: ./ai-verification-engine
      dockerfile: Dockerfile
    container_name: civicguard-ai-engine
    restart: always
    ports:
      - "5000:5000"
    environment:
      MODEL_PATH: /app/model
      CONFIDENCE_THRESHOLD: 0.85
      MAX_IMAGE_SIZE_MB: 10
    volumes:
      - ai_models:/app/model
    networks:
      - civicguard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Mongo Express (Admin UI - Dev Only) ────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: civicguard-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: civicguard_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-CivicGuard@2026}
      ME_CONFIG_MONGODB_URL: mongodb://civicguard_admin:${MONGO_PASSWORD:-CivicGuard@2026}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: civicguard
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - civicguard-network
    profiles:
      - dev

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  complaint_uploads:
    driver: local
  ai_models:
    driver: local

networks:
  civicguard-network:
    driver: bridge
    name: civicguard-net
