# ═══════════════════════════════════════════════════════
#  CivicGuard-AI — Application Configuration
#  AI-Powered Civic Issue Monitoring & Auto-Escalation
# ═══════════════════════════════════════════════════════

# ─── Server ────────────────────────────────────────────
server.port=8080
spring.application.name=CivicGuard-AI

# ─── MongoDB ───────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/civicguard_db
spring.data.mongodb.database=civicguard_db
spring.data.mongodb.auto-index-creation=true

# ─── File Upload ───────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
complaint.upload.dir=./uploads

# ─── JWT Security ──────────────────────────────────────
jwt.secret=CivicGuardSuperSecretKey2026IndiaDigitalGovernance
jwt.expiration=86400000

# ─── AI Verification Engine ───────────────────────────
ai.engine.url=http://localhost:5000
ai.engine.timeout=30
ai.confidence.threshold=0.85

# ─── Email (SMTP) ─────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:civicguard@gov.in}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── SMS Notifications ────────────────────────────────
notification.sms.enabled=false
notification.sms.provider=msg91
notification.sms.api-key=${SMS_API_KEY:}

# ─── Actuator (Health Checks) ─────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── Logging ──────────────────────────────────────────
logging.level.com.civicguard=INFO
logging.level.org.springframework.data.mongodb=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Scheduling ───────────────────────────────────────
spring.task.scheduling.pool.size=5
